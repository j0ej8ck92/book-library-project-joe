<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&family=Roboto+Slab:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="main.js" defer></script>
    <title>Book Library</title>
</head>
<body>
    <div class="wrapper">
    <div class="header">
        <dialog id="book-dialog">
          <div class="dialog-content">
            <form id="form">
                <div class="form-div">
                <label for="book-name">Book Name:</label>
                <input type="text" name="book-name" id="book-name" required>
                </div>
                <div class="form-div">
                <label for="author-name">Author Name:</label>
                <input type="text" name="author-name" id="author-name" required>
                </div>
                <div class="form-div">
                <label for="page-count">Page Number:</label>
                <input type="number" name="page-count" id="page-count" min="1" required>
                </div>
                <div class="form-div">
                <label for="confirm">Read:</label>
                <select id="select">
                <option id="no" value="Yes">Yes</option>
                <option id="yes" value="No">No</option>
                </select>
                </div>
                <div class="form-div">
                <button id="submit" type="submit">Submit<button>
                </div>
                <div class="form-div">
                <button class="cancel-book">Cancel</button>
                </div>
            </form>
          </div>  
        </dialog>
        <div class="add-book-div">
            <button class="add-book">
                <div class="add-book-text">Add Book</div>
            </button>
        </div>
    </div>
    <div class="sidebar">Library</div>
    <div class="library-content"></div>
    </div>
    
</body>
</html>
