<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&family=Roboto+Slab:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="main.js" defer></script>
    <title>Book Library</title>
</head>
<body>
    <div class="wrapper">
    <div class="header">
        <dialog id="book-dialog">
          <div class="dialog-content">
            <form id="form" action="/" method="GET">
                <div class="form-div">
                <label for="book-name">Book Name:</label>
                <input type="text" name="book-name" id="book-name" required>
                </div>
                <div class="form-div">
                <label for="author-name">Author Name:</label>
                <input type="text" name="author-name" id="author-name" required>
                </div>
                <div class="form-div">
                <label for="page-count">Page Number:</label>
                <input type="number" name="page-count" id="page-count" required>
                </div>
                <div class="form-div">
                <label for="confirm">Read:</label>
                <select id="confirm" name="confirm">
                <option id="yes" value="yes">Yes</option>
                <option id="no" value="no">No</option>
                </select>
                </div>
                <div class="form-div">
                <button class="form-submit-button" type="submit">Submit</button>
                </div>






            </form>
            
            <button class="cancel-book">Cancel</button>
          </div>  
        </dialog>
        <button class="add-book">Add Book</button>
    </div>
    <div class="sidebar">Library</div>
    <div class="library-content">
        <div class="card">

            <div class="book-title">The Hobbit</div>
            <div class="author">J.R.R. Tolkein</div>
            <div class="pages">300</div>
            <div class="read"> 
                <button class="read-yes-or-no">Read</button>
            </div>

        </div>

        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div> -->

        



    </div>
    <div></div>
    </div> <!--wrapper end-->
    
</body>
</html>
